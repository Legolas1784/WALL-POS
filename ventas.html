<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ventas - WALL</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<header>
    <h1>Registrar Venta - WALL</h1>

    <nav>
        <a href="index.html">Inicio</a>
    </nav>
</header>

<section class="contenedor">
    
    <form id="formVenta">
        <label>Producto</label>
        <input type="text" id="producto" placeholder="Ej: Laptop" required>

        <label>Precio</label>
        <input type="number" id="precio" placeholder="Ej: 1200000" required>

        <button type="submit">Guardar Venta</button>
    </form>

    <p id="mensaje"></p>

</section>

<script src="script.js"></script>
</body>
</html>
